<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ночь, Луна и Ты</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>

    <svg style="display: none;">
        <defs>
            <filter id="tears-filter" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.02 0.15" numOctaves="3" seed="0">
                    <animate attributeName="seed" values="0;100;0" dur="8s" repeatCount="indefinite" />
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" scale="20" />
            </filter>
        </defs>
    </svg>
    
    <div class="night-scene">
        <div class="stars"></div>
        
        <!-- VHS-эффект (появляется после старта, исчезает к припеву) -->
        <div class="vhs-overlay"></div>
        
        <img src="moon.png" alt="Луна" class="moon" id="moonImg">
        
        <div class="lyrics-container" id="lyricsContainer"></div>
        <div class="couple-silhouette"></div>
        <div class="hill-landscape"></div>
        <div class="flash" id="flash"></div>
        
        <div class="anniversary-message" id="anniversaryMsg">
            <h2>4 месяца.</h2>
            <p>Маленькая дата - большой истории.</p>
            <div class="heart">❤</div>
        </div>
    </div>
    
    <audio id="musicPlayer" src="song.mp3" preload="auto"></audio>
    
    <button id="startBtn">Посмотреть ночь</button>

    <script src="script.js"></script>
</body>
</html>
